# =====================================================
# DIGITAL OILFIELD PLATFORM SETTINGS
# =====================================================

system:
  name: Oilfield Analytics Platform
  version: 1.0
  environment: production


# =====================================================
# DATA PATHS
# =====================================================

paths:



  paths:
  raw: raw
  incoming: raw
  modeled: modeled
  staged: staged
  reports: reports
  outputs_ml: outputs_ml
  logs: logs
  


file_patterns:
  master_well: "master_well.csv"
  production: "production_data.csv"
  chemical_rates: "chemical_rates.csv"
  chemical_cost: "chemical_cost.csv"
  failures: "failure_data.csv"
  scada: "scada_data.csv"
  workovers: "workover_data.csv"

units:
  boe_gas_mcf_per_boe: 6.0
  boe_oil_bbl_per_boe: 1.0

runtime:
  write_csv: true
  write_run_status: true

# =====================================================
# FAILURE PREDICTION MODEL
# =====================================================

failure_model:

  algorithm: random_forest

  trees: 300

  max_depth: 8

  test_split: 0.2

  random_seed: 42



# =====================================================
# FAILURE ALERT THRESHOLDS
# =====================================================

alerts:

  failure_probability_7d: 0.60

  failure_probability_30d: 0.50

  deterioration_score: 2.5



# =====================================================
# CHEMICAL OPTIMIZATION
# =====================================================

chemical_program:

  min_ppm: 10

  max_ppm: 200

  optimal_ppm: 50

  overtreat_threshold: 1.5

  undertreat_threshold: 0.6



# =====================================================
# DIGITAL TWIN SIMULATION PARAMETERS
# =====================================================

digital_twin:

  pump_speed_multipliers:

    - 0.9
    - 1.0
    - 1.1
    - 1.2

  chemical_multipliers:

    - 0.8
    - 1.0
    - 1.2
    - 1.4

  runtime_multipliers:

    - 0.8
    - 1.0
    - 1.1



# =====================================================
# OPTIMIZATION ENGINE WEIGHTS
# =====================================================

optimization:

  oil_weight: 1.0

  risk_weight: 40

  cost_weight: 0.1



# =====================================================
# REINFORCEMENT LEARNING PARAMETERS
# =====================================================

reinforcement_learning:

  learning_rate: 0.20

  discount_factor: 0.90

  exploration_rate: 0.10



# =====================================================
# RL FEEDBACK WINDOW
# =====================================================

feedback:

  evaluation_days: 14

  reward_oil_weight: 1.0

  reward_risk_weight: 50

  reward_cost_weight: 0.1



# =====================================================
# SPOTFIRE OUTPUT TABLES
# =====================================================

report_tables:

  production_summary: rpt_production_summary.csv

  chemical_dashboard: rpt_chemistry_daily.csv

  failure_risk: rpt_failure_risk.csv

  prescriptive_actions: rpt_prescriptive_actions.csv

  optimization_results: rpt_optimization_results.csv

  digital_twin: rpt_digital_twin.csv

  rl_recommendations: rpt_rl_recommendations.csv

  rl_feedback: rpt_rl_feedback_loop.csv

 